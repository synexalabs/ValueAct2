name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  actuarial-engine-test:
    name: Actuarial Engine Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./actuarial-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: actuarial-engine/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short

  client-test:
    name: Client Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [actuarial-engine-test, client-test]

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build actuarial-engine
        uses: docker/build-push-action@v5
        with:
          context: ./actuarial-engine
          push: false

      - name: Build server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false

      - name: Build client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          build-args: NEXT_PUBLIC_API_URL=http://localhost:3001
