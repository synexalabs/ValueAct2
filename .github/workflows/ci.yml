name: CI Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

env:
    NODE_VERSION: "20"
    PYTHON_VERSION: "3.11"

jobs:
    # ===========================================
    # Frontend Tests (Next.js Client)
    # ===========================================
    frontend-test:
        name: Frontend Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./client

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint || true

            - name: Run tests
              run: npm test -- --passWithNoTests || true

            - name: Build check
              run: npm run build
              env:
                  NEXT_PUBLIC_API_URL: http://localhost:3001

    # ===========================================
    # Backend Tests (Node.js Server)
    # ===========================================
    backend-test:
        name: Backend Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./server

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "npm"
                  cache-dependency-path: server/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint || true

            - name: Run tests
              run: npm test || true

    # ===========================================
    # Actuarial Engine Tests (Python)
    # ===========================================
    actuarial-engine-test:
        name: Actuarial Engine Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./actuarial-engine

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"
                  cache-dependency-path: actuarial-engine/requirements.txt

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-cov flake8

            - name: Run Flake8 linting
              run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

            - name: Run Pytest
              run: |
                  pytest --tb=short -v || true

            - name: Test DAV mortality tables
              run: |
                  python -c "
                  from data.mortality_tables import MORTALITY_TABLES, get_mortality_rate
                  print('Testing DAV tables...')
                  assert 'DAV_2008_T_MALE' in MORTALITY_TABLES
                  assert 'DAV_2004_R_MALE' in MORTALITY_TABLES
                  rate = get_mortality_rate('DAV_2008_T', 50, 'M')
                  assert 0 < rate < 1
                  print('✅ DAV tables working correctly')
                  "

            - name: Test EIOPA yield curve
              run: |
                  python -c "
                  from utils.eiopa_yield_curve import get_eiopa_yield_curve, get_curve_summary
                  print('Testing EIOPA yield curve...')
                  summary = get_curve_summary('EUR', 'DE')
                  assert summary['ufr'] == 0.0345
                  assert summary['volatility_adjustment'] > 0
                  print('✅ EIOPA yield curve working correctly')
                  "

    # ===========================================
    # Security Scanning
    # ===========================================
    security-scan:
        name: Security Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run npm audit (client)
              working-directory: ./client
              run: npm audit --audit-level=high || true

            - name: Run npm audit (server)
              working-directory: ./server
              run: npm audit --audit-level=high || true

            - name: Run pip audit
              working-directory: ./actuarial-engine
              run: |
                  pip install pip-audit
                  pip-audit -r requirements.txt || true

    # ===========================================
    # Docker Build Test
    # ===========================================
    docker-build:
        name: Docker Build Test
        runs-on: ubuntu-latest
        needs: [frontend-test, backend-test, actuarial-engine-test]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build client image
              uses: docker/build-push-action@v5
              with:
                  context: ./client
                  push: false
                  tags: valuact-client:test
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build server image
              uses: docker/build-push-action@v5
              with:
                  context: ./server
                  push: false
                  tags: valuact-server:test
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build actuarial-engine image
              uses: docker/build-push-action@v5
              with:
                  context: ./actuarial-engine
                  push: false
                  tags: valuact-actuarial-engine:test
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
