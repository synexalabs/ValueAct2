version: "3.8"

x-common-env: &common-env
  TZ: UTC
  LOG_LEVEL: info

services:
  # Python Actuarial Engine (FastAPI)
  actuarial-engine:
    build:
      context: ./actuarial-engine
      dockerfile: Dockerfile
    container_name: valuact-actuarial-engine
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      WORKERS: 4
      MAX_REQUESTS: 1000
      MAX_REQUESTS_JITTER: 50
    volumes:
      - ./actuarial-engine/data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - valuact-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

  # Node.js Backend (Express)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: valuact-server
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      NODE_ENV: production
      PYTHON_ENGINE_URL: http://actuarial-engine:8000
      CALCULATION_TIMEOUT: 300000
    env_file:
      - ./server/.env
    volumes:
      - server_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      actuarial-engine:
        condition: service_healthy
    networks:
      - valuact-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # Next.js Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: valuact-client
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: http://localhost:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    networks:
      - valuact-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

networks:
  valuact-network:
    driver: bridge
    name: valuact-network

volumes:
  server_logs:
    name: valuact-server-logs
