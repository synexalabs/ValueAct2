apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: valuact
  labels:
    app: server
    app.kubernetes.io/name: valuact
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: valuact/server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: valuact-config
                  key: NODE_ENV
            - name: CALCULATION_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: valuact-config
                  key: CALCULATION_TIMEOUT
            - name: PYTHON_ENGINE_URL
              value: "http://actuarial-engine:8000"
            - name: REDIS_URL
              value: "redis://redis:6379/1"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: valuact-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: valuact
spec:
  selector:
    app: server
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-hpa
  namespace: valuact
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: server
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
